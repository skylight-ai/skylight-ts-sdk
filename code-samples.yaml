overlay: 1.0.0
info:
  title: CodeSamples overlay for typescript target
  version: 0.0.0
actions:
  - target: $["paths"]["/agent/run/{instance_id}"]["post"]
    update:
      "x-codeSamples":
        - "lang": "typescript"
          "label": "Typescript (SDK)"
          "source": "import { Skylight } from \"skylight-sdk\";\n\nconst skylight = new Skylight({\n  apikey: process.env[\"SKYLIGHT_APIKEY\"] ?? \"\",\n});\n\nasync function run() {\n  const result = await skylight.agent.run({\n    instanceId: \"<id>\",\n    claudeRequest: {\n      query: \"Search for something on the VM\",\n    },\n  });\n\n  // Handle the result\n  console.log(result);\n}\n\nrun();"
