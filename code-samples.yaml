actions:
  - target: $["paths"]["/agent/answer/{agent_id}"]["post"]
    update:
      "x-codeSamples":
        - "lang": "typescript"
          "label": "Typescript (SDK)"
          "source": "import { Skylight } from \"skylight-sdk\";\n\nconst skylight = new Skylight({\n  apikey: process.env[\"SKYLIGHT_APIKEY\"] ?? \"\",\n});\n\nasync function run() {\n  const result = await skylight.agent.answer(\"<id>\", {});\n\n  // Handle the result\n  console.log(result);\n}\n\nrun();"
